name: Update README

on:
  schedule:
    - cron: '0 0 * * *'  # Update setiap hari jam 00:00 UTC
  workflow_dispatch:       # Bisa dijalankan manual juga

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Diperlukan untuk melakukan commit kembali ke repository

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4 # Versi terbaru saat ini

    - name: Set up Node.js
      uses: actions/setup-node@v4 # Versi terbaru saat ini
      with:
        node-version: '18' # Anda bisa menggunakan versi LTS yang lebih baru jika mau

    - name: Generate dynamic README content
      run: node ./.github/scripts/update-readme.js # Jalankan skrip Node.js

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        # Commit hanya jika ada perubahan pada README.md
        if ! git diff --quiet README.md; then
          git commit -m "chore(readme): update dynamic content"
          git push
        else
          echo "No changes to README.md to commit."
        fi
