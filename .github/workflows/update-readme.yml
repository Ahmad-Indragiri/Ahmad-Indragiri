name: Update Dynamic README

on:
  schedule:
    - cron: '0 */6 * * *' # Update setiap 6 jam
  workflow_dispatch: # Bisa dijalankan manual juga
  push: # Tambahkan trigger ini jika Anda ingin README diperbarui setiap kali ada push ke main
    branches:
      - main # atau master, sesuaikan dengan nama branch utama Anda

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Diperlukan untuk melakukan commit kembali ke repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Gunakan versi LTS Node.js terbaru
          cache: 'npm' # Cache dependencies npm jika Anda menggunakannya (misal untuk rss-parser)

      # Jika Anda menggunakan dependensi seperti rss-parser, uncomment baris berikut
      # - name: Install dependencies
      #   run: npm ci --prefix ./.github/scripts # Pastikan package.json ada di .github/scripts

      - name: Generate dynamic README content
        run: node ./.github/scripts/update-readme.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Commit hanya jika ada perubahan pada README.md
          if ! git diff --staged --quiet README.md; then
            git commit -m "chore(readme): ✨ auto-update dynamic content"
            git push
          else
            echo "No changes to README.md. Nothing to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
